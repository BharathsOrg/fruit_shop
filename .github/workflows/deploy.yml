name: Build, Push and Deploy to K8s

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Artifact Registry
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Configure Docker to use Artifact Registry
        run: |
          gcloud auth configure-docker us-west2-docker.pkg.dev --quiet

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: us-west2-docker.pkg.dev/krishproject87/docker-images/fruits_shop:latest
          labels: |
            org.opencontainers.image.description=Fruit Shop API Docker Image
            org.opencontainers.image.version=latest

      - name: Deploy to K8s (Local Overlay)
        run: |
          echo "🚀 Starting Deployment to Kubernetes using Local Overlay..."
          # We use the local overlay to ensure we are deploying the dev version
          kubectl kustomize k8s/kustomize/overlays/local | kubectl apply -f -
          echo "✅ Deployment Successful!"
